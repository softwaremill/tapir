# Order identical except `note` default differs.
openapi: 3.1.0
info:
  title: Redefine default value
  version: '1.0'
paths:
  /redefine/default:
    post:
      operationId: redefineOrderDefault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '204':
          description: OK
components:
  schemas:
    Pet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        species:
          type: string
    Order:
      type: object
      required:
        - id
        - pet
      properties:
        id:
          type: integer
          format: int64
        pet:
          $ref: '#/components/schemas/Pet'
        note:
          type: string
          default: shipped
