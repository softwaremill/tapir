# Identical to core.yaml schemas — every shared model should alias to core.
openapi: 3.1.0
info:
  title: Full reuse (all schemas match core)
  version: '1.0'
paths:
  /reuse/all/pets:
    get:
      operationId: reuseAllListPets
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
components:
  schemas:
    Pet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        species:
          type: string
    Address:
      type: object
      required:
        - city
      properties:
        city:
          type: string
        postcode:
          type: string
    Person:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        home:
          $ref: '#/components/schemas/Address'
    Status:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
    Animal:
      oneOf:
        - $ref: '#/components/schemas/Dog'
        - $ref: '#/components/schemas/Cat'
      discriminator:
        propertyName: kind
        mapping:
          dog: '#/components/schemas/Dog'
          cat: '#/components/schemas/Cat'
    Dog:
      type: object
      required:
        - kind
        - barks
      properties:
        kind:
          type: string
        barks:
          type: boolean
    Cat:
      type: object
      required:
        - kind
        - lives
      properties:
        kind:
          type: string
        lives:
          type: integer
          format: int32
    TagMap:
      type: object
      additionalProperties:
        type: string
    IdList:
      type: array
      items:
        type: integer
        format: int64
    PetName:
      type: string
    Widget:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        label:
          type: string
    Order:
      type: object
      required:
        - id
        - pet
      properties:
        id:
          type: integer
          format: int64
        pet:
          $ref: '#/components/schemas/Pet'
        note:
          type: string
          default: pending
