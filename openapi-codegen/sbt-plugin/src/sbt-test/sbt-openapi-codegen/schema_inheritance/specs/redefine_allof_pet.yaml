# allOf adds extra field via second object — Pet redefined through composition.
openapi: 3.1.0
info:
  title: Redefine allOf-composed Pet
  version: '1.0'
paths:
  /redefine/allof-pet:
    post:
      operationId: redefineAllOfPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        '204':
          description: OK
components:
  schemas:
    Pet:
      allOf:
        - type: object
          required:
            - name
          properties:
            name:
              type: string
            species:
              type: string
        - type: object
          properties:
            vaccinated:
              type: boolean
