openapi: 3.1.0
info:
  title: Merge part 2
  version: '1.0'
paths:
  /merge/part2:
    get:
      operationId: mergePart2GetBeta
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Beta'
components:
  schemas:
    Beta:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
          format: int32
    Gamma:
      type: object
      required:
        - alpha
        - beta
      properties:
        alpha:
          $ref: '#/components/schemas/Alpha'
        beta:
          $ref: '#/components/schemas/Beta'
