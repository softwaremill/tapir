# Order matches core but Pet inlined with missing species — transitive identity broken.
openapi: 3.1.0
info:
  title: Transitive mismatch (Order matches, Pet does not)
  version: '1.0'
paths:
  /transitive/mismatch:
    post:
      operationId: transitiveMismatchOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
components:
  schemas:
    Pet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    Order:
      type: object
      required:
        - id
        - pet
      properties:
        id:
          type: integer
          format: int64
        pet:
          $ref: '#/components/schemas/Pet'
        note:
          type: string
          default: pending
