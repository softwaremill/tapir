# Discriminated oneOf identical to core.
openapi: 3.1.0
info:
  title: Reuse oneOf ADT
  version: '1.0'
paths:
  /reuse/oneof:
    post:
      operationId: reuseOneOfAnimal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Animal'
      responses:
        '204':
          description: OK
components:
  schemas:
    Animal:
      oneOf:
        - $ref: '#/components/schemas/Dog'
        - $ref: '#/components/schemas/Cat'
      discriminator:
        propertyName: kind
        mapping:
          dog: '#/components/schemas/Dog'
          cat: '#/components/schemas/Cat'
    Dog:
      type: object
      required:
        - kind
        - barks
      properties:
        kind:
          type: string
        barks:
          type: boolean
    Cat:
      type: object
      required:
        - kind
        - lives
      properties:
        kind:
          type: string
        lives:
          type: integer
          format: int32
